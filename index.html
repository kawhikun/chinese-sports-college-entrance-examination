<style>
:root{
  --bg:#f4f7fb;--card:#fff;--line:#e6edf5;--text:#102033;--muted:#62748a;
  --primary:#123a64;--primary-2:#1d5b96;--soft:#f8fbff;--good:#ecfdf3;--good-line:#93e2ae;
  --bad:#fff1f2;--bad-line:#f7a8b8;--warn:#fff8e6;--warn-line:#f0c95d;--shadow:0 12px 30px rgba(16,32,51,.07);
}
*{box-sizing:border-box} html,body{margin:0;padding:0}
body{
  background:var(--bg); color:var(--text);
  font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","PingFang SC","Microsoft YaHei",sans-serif;
}
body::before{
  content:"凡人认知";
  position:fixed; inset:auto 18px 14px auto; font-size:12px; color:rgba(18,58,100,.22);
  pointer-events:none; z-index:0; letter-spacing:.08em;
}
.container{max-width:1500px;margin:0 auto;padding:18px;position:relative;z-index:1}
.layout{display:grid;grid-template-columns:290px 1fr;gap:20px}
@media(max-width:1120px){.layout{grid-template-columns:1fr}}
.sidebar,.card{background:var(--card);border:1px solid var(--line);border-radius:28px;box-shadow:var(--shadow)}
.sidebar{padding:14px;position:sticky;top:18px;align-self:start}
.brand{padding:12px 14px 18px;border-bottom:1px solid var(--line);margin-bottom:12px}
.brand small{display:block;color:var(--muted);letter-spacing:.14em;text-transform:uppercase}
.brand h1{margin:8px 0 0;font-size:22px;line-height:1.25}
.brand .maker{margin-top:10px;font-size:13px;color:var(--primary-2);font-weight:600}
.nav-btn{width:100%;border:none;background:transparent;text-align:left;padding:14px 16px;border-radius:18px;cursor:pointer;margin-bottom:6px;color:var(--text);transition:.18s}
.nav-btn:hover{background:#f8fafc}
.nav-btn.active{background:var(--primary);color:#fff}
.main{display:flex;flex-direction:column;gap:20px}
.hero{padding:24px;background:linear-gradient(135deg,#fff 0%,#f8fbff 55%,#eef4fb 100%)}
.badge{display:inline-flex;align-items:center;gap:8px;border:1px solid var(--line);background:#fff;color:var(--muted);padding:8px 12px;border-radius:999px;font-size:12px}
.hero h2{margin:14px 0 10px;font-size:34px;line-height:1.18}
.hero p{margin:0;max-width:980px;color:var(--muted);line-height:1.85}
.stats{display:grid;grid-template-columns:repeat(5,minmax(0,1fr));gap:12px;margin-top:18px}
@media(max-width:980px){.stats{grid-template-columns:repeat(2,minmax(0,1fr))}}
.stat{background:#fff;border:1px solid var(--line);border-radius:20px;padding:14px;text-align:center}
.stat strong{display:block;font-size:24px;margin-bottom:4px}
.section{display:none;flex-direction:column;gap:20px}
.section.active{display:flex}
.card{padding:20px}
.card h3{margin:0;font-size:20px}
.subtitle{margin-top:6px;color:var(--muted);font-size:14px;line-height:1.75}
.grid-2{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:20px}
.grid-3{display:grid;grid-template-columns:repeat(3,minmax(0,1fr));gap:20px}
.grid-main{display:grid;grid-template-columns:1.2fr .8fr;gap:20px}
@media(max-width:1120px){.grid-2,.grid-3,.grid-main{grid-template-columns:1fr}}
.row{display:flex;gap:10px;flex-wrap:wrap}
.pill{border:1px solid var(--line);background:#fff;padding:10px 14px;border-radius:999px;cursor:pointer;color:var(--text)}
.pill.active{background:var(--primary);color:#fff;border-color:var(--primary)}
.input,.textarea,select{width:100%;border:1px solid var(--line);background:#fff;border-radius:18px;padding:12px 14px;color:var(--text);outline:none}
.textarea{min-height:160px;resize:vertical;line-height:1.8}
.btn{border:none;border-radius:18px;padding:12px 16px;cursor:pointer;background:var(--primary);color:#fff}
.btn.secondary{background:#fff;color:var(--text);border:1px solid var(--line)}
.btn.danger{background:#8b1e3f}
.small{font-size:13px;color:var(--muted)}
.block{background:var(--soft);border:1px solid var(--line);border-radius:20px;padding:16px}
.block.good{background:var(--good);border-color:var(--good-line)}
.block.bad{background:var(--bad);border-color:var(--bad-line)}
.block.warn{background:var(--warn);border-color:var(--warn-line)}
.list{margin:0;padding:0;list-style:none}
.list li{padding:10px 0;border-bottom:1px dashed var(--line);line-height:1.78}
.list li:last-child{border-bottom:none}
.q-stem{font-size:18px;line-height:1.9;margin:16px 0 8px}
.option{display:flex;gap:12px;width:100%;background:#fff;border:1px solid var(--line);border-radius:18px;padding:14px;margin-top:12px;cursor:pointer;text-align:left}
.option.active{border-color:var(--primary);background:#f8fbff}
.option.correct{background:var(--good);border-color:var(--good-line)}
.option.wrong{background:var(--bad);border-color:var(--bad-line)}
.opt-code{width:30px;height:30px;border:1px solid #cfd8e3;border-radius:999px;display:inline-flex;align-items:center;justify-content:center;flex-shrink:0}
.tag{display:inline-flex;align-items:center;border-radius:999px;padding:6px 10px;background:#eef4ff;color:#274b87;font-size:12px;margin:4px 8px 0 0}
.table{width:100%;border-collapse:collapse}
.table th,.table td{border-bottom:1px solid var(--line);padding:10px 12px;text-align:left;font-size:14px}
.table th{background:#f8fbff}
.paper-question{padding:16px 0;border-bottom:1px dashed var(--line)}
.paper-question:last-child{border-bottom:none}
.footer-note{font-size:12px;color:var(--muted);text-align:center;padding:4px 0 10px}
.watermark-box{font-size:12px;color:var(--primary-2);font-weight:600}
.copy-success{font-size:13px;color:#0f8a4b}
.count-badge{display:inline-flex;align-items:center;justify-content:center;min-width:28px;height:28px;padding:0 8px;border-radius:999px;background:#edf3fb;color:var(--primary-2);font-size:12px}
input[type="file"]{display:block}

html[data-mode="mobile"] body{font-size:16px}
body{min-height:100dvh;-webkit-tap-highlight-color:transparent}
input,textarea,button,select{font:inherit}
#device-gate{position:fixed;inset:0;background:rgba(11,21,32,.68);backdrop-filter:blur(6px);z-index:9999;display:none;align-items:center;justify-content:center;padding:18px}
#device-gate.show{display:flex}
.device-panel{width:min(780px,100%);background:#fff;border:1px solid var(--line);border-radius:28px;box-shadow:0 30px 80px rgba(10,20,30,.25);padding:26px}
.device-title{font-size:26px;font-weight:700;line-height:1.3;margin:0}
.device-desc{margin:10px 0 0;color:var(--muted);line-height:1.8}
.device-grid{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:14px;margin-top:18px}
.device-btn{border:1px solid var(--line);background:#fff;border-radius:20px;padding:16px 14px;text-align:left;cursor:pointer;transition:.18s}
.device-btn:hover{border-color:var(--primary-2);background:#f8fbff}
.device-btn strong{display:block;font-size:16px;color:var(--text)}
.device-btn span{display:block;margin-top:6px;font-size:13px;color:var(--muted);line-height:1.6}
.device-row{display:flex;gap:10px;align-items:center;flex-wrap:wrap;margin-top:10px}
.device-badge,.security-badge{display:inline-flex;align-items:center;gap:6px;padding:7px 12px;border-radius:999px;background:#eef5ff;border:1px solid #d8e8fb;color:var(--primary);font-size:12px;font-weight:600}
.mini-btn{border:1px solid var(--line);background:#fff;color:var(--text);padding:8px 12px;border-radius:999px;cursor:pointer;font-size:12px}
.mini-btn:hover{background:#f8fafc}
.protect-tip{position:fixed;left:50%;bottom:16px;transform:translateX(-50%);background:rgba(16,32,51,.92);color:#fff;padding:10px 14px;border-radius:999px;font-size:12px;z-index:9998;display:none;box-shadow:0 8px 24px rgba(0,0,0,.18)}
.protect-tip.show{display:block}
.hero .hero-meta{display:flex;gap:10px;flex-wrap:wrap;margin-top:12px}
.table{width:100%;border-collapse:collapse}
.table th,.table td{padding:11px 10px;border-bottom:1px solid var(--line);text-align:left;font-size:14px}
@media(max-width:1120px){
  .container{padding:14px}
  .sidebar{position:static}
  .sidebar .nav-btn{display:inline-flex;align-items:center;width:auto;margin:0 8px 8px 0}
}
@media(max-width:820px){
  .device-grid{grid-template-columns:1fr}
  .hero h2{font-size:26px}
  .grid-3,.grid-2,.grid-main,.layout{grid-template-columns:1fr !important}
  .stats{grid-template-columns:repeat(2,minmax(0,1fr))}
  .sidebar{padding:12px;border-radius:22px}
  .main{min-width:0}
  .option,.btn,.pill,.nav-btn,.mini-btn,.device-btn{min-height:44px}
  .table{display:block;overflow:auto;white-space:nowrap}
}
@media(max-width:600px){
  body::before{right:10px;bottom:10px;font-size:10px}
  .container{padding:10px}
  .card,.sidebar{border-radius:20px}
  .brand h1{font-size:20px}
  .hero{padding:18px}
  .hero p{font-size:14px;line-height:1.85}
  .stats{grid-template-columns:1fr 1fr}
  .paper-question .option{padding:14px 12px}
  textarea.textarea,input,select{font-size:16px}
}

</style>

    iphone:{label:"苹果手机端", mode:"mobile"}
  };

}
function detectAutoDevice(){
  const ua = (navigator.userAgent || "").toLowerCase();
  if(/iphone|ipad|ipod/.test(ua)) return "iphone";
  if(/android/.test(ua)) return "android";
  if(/macintosh|mac os x/.test(ua)) return "mac";
  return "windows";
}

function sample(arr, n){
  const copy = arr.slice();
  for(let i=copy.length-1;i>0;i--){
    const j = Math.floor(Math.random()*(i+1));
    [copy[i], copy[j]] = [copy[j], copy[i]];
  }
  return copy.slice(0, n);
}
function escapeHtml(str){

}
function resolveQuestionPassage(q, revealSource){
  if(!q) return "";

}

  const objectiveCorrect = state.history.filter(i => i.mode === "objective" && i.correct === true).length;
  const notesCount = state.notes.length;
  const accuracy = objectiveTotal ? Math.round(objectiveCorrect * 100 / objectiveTotal) : 0;
  document.getElementById("stats").innerHTML = [
    ["累计练习", total],
    ["客观题正确率", accuracy + "%"],
    ["错题/复盘", state.notes.length],
    ["个人规则", state.rules.length],

function buildPaper(){
  const paper = { knowledge: [], modern: [], classical: [], writing: null, answers: {}, score: null };
  const knowledgePool = ["phonetic","orthography","words","grammar","punctuation","rhetoric","sequence"];
  let picks = [];
  knowledgePool.forEach(k => picks.push({cat:k, item: sample(BANKS[k].items,1)[0]}));
  while(picks.length < 10){
    const k = knowledgePool[Math.floor(Math.random()*knowledgePool.length)];
    const item = sample(BANKS[k].items.filter(x => !picks.find(p => p.item.id === x.id)),1)[0];
    if(item) picks.push({cat:k, item});
  }
  paper.knowledge = picks.slice(0,10);
  paper.modern = sample(BANKS.modern.items, 8).map(item => ({cat:"modern", item}));
  paper.classical = sample(BANKS.classical.items, 6).map(item => ({cat:"classical", item}));
  paper.writing = sample(BANKS.writing.items, 1)[0];
  return paper;
}

function submitPaper(){
  let k=0,m=0,c=0;
  const weakMap = {};
  state.paper.knowledge.forEach(wrapper => {
    const q = wrapper.item;

    if(ok) k += 4;
    weakMap[wrapper.cat] = weakMap[wrapper.cat] || { total:0, correct:0 };
    weakMap[wrapper.cat].total += 1; if(ok) weakMap[wrapper.cat].correct += 1;
  });
  state.paper.modern.forEach(wrapper => {
    const q = wrapper.item; const ok = state.paper.answers[q.id] === q.answer; if(ok) m += 4;
    weakMap.modern = weakMap.modern || { total:0, correct:0 }; weakMap.modern.total += 1; if(ok) weakMap.modern.correct += 1;
  });
  state.paper.classical.forEach(wrapper => {
    const q = wrapper.item; const ok = state.paper.answers[q.id] === q.answer; if(ok) c += 3;
    weakMap.classical = weakMap.classical || { total:0, correct:0 }; weakMap.classical.total += 1; if(ok) weakMap.classical.correct += 1;
  });
  const weak = Object.keys(weakMap).map(key => {
    const x = weakMap[key];
    return { label: BANKS[key] ? BANKS[key].label : (key === "modern" ? "现代文单题" : "文言与古诗"), rate: x.total ? x.correct/x.total : 1 };
  }).sort((a,b)=>a.rate-b.rate).slice(0,3).map(x => `${x.label}（正确率 ${Math.round(x.rate*100)}%）`);
  state.paper.score = { knowledge:k, modern:m, classical:c, objective:k+m+c, weak };
  saveHistory({ id:String(Date.now()), mode:"paper", category:"paper", questionId:"paper-"+Date.now(), title:"整卷模拟", correct:null, createdAt:new Date().toLocaleString() });
  renderPaper();
}

<script>
(function(){
function renderTagList(tags){
    if(!tags || !tags.length) return "";
    return `<div style="margin:10px 0 2px">${tags.slice(0,4).map(tag => `<span class="tag">${escapeHtml(tag)}</span>`).join("")}</div>`;

function collectBankKnowledge(bankKey){
  const seen = new Set();
  const out = [];
  ((BANKS[bankKey] && BANKS[bankKey].items) || []).forEach(item => {
    (item.knowledge || []).forEach(line => {
      const key = String(line || '').trim();
      if(key && !seen.has(key)){
        seen.add(key);
        out.push(key);
      }
    });
  });
  return out;
}

function categoryTagLabel(bankKey){
  return BANKS[bankKey] && BANKS[bankKey].label ? BANKS[bankKey].label : bankKey;
}

function canonicalSignature(stem, options, answer){
  return [String(stem || ''), ...options.map(i => String(i || '')), String(answer)].join('||');
}

function inferMixMode(bankKey, item){
  const stem = String(item && item.stem || '');
  if(bankKey === 'grammar') return /没有语病/.test(stem) ? 'correct' : 'wrong';
  if(bankKey === 'punctuation') return /使用正确/.test(stem) ? 'correct' : 'wrong';
  return 'correct';
}

function mixStemFor(bankKey, mode){
  if(bankKey === 'phonetic') return '下列词语中加点字读音全都正确的一项是（逻辑变式）';
  if(bankKey === 'orthography') return '下列词语中书写完全正确的一项是（逻辑变式）';
  if(bankKey === 'grammar') return mode === 'correct' ? '下列各句中，没有语病的一项是（逻辑变式）' : '下列各句中，有语病的一项是（逻辑变式）';
  if(bankKey === 'punctuation') return mode === 'correct' ? '下列句子中，标点符号使用正确的一项是（逻辑变式）' : '下列句子中，标点符号使用不恰当的一项是（逻辑变式）';
  return BANKS[bankKey] && BANKS[bankKey].label ? BANKS[bankKey].label : bankKey;
}

function mixAnalysisFor(bankKey, mode){
  if(bankKey === 'phonetic') return '本题为逻辑变式训练。先排熟悉的错音，再回到语境判断多音字，最后复核声旁误导字。正确项中的词语读音均规范。';
  if(bankKey === 'orthography') return '本题为逻辑变式训练。字形题要优先检查固定搭配、成语俗写和形近字误写。正确项中的词语书写均规范。';
  if(bankKey === 'grammar') return mode === 'correct' ? '本题为逻辑变式训练。没有语病的一项应同时经得起主干压缩、搭配检查和逻辑复核。' : '本题为逻辑变式训练。有语病的一项通常会在主干、搭配、语序或逻辑上露出破绽。';
  if(bankKey === 'punctuation') return mode === 'correct' ? '本题为逻辑变式训练。标点判断要先看句子层次，再看引号、问号、冒号和分号的边界。' : '本题为逻辑变式训练。找“不恰当项”时，要特别注意问号、引号、冒号和分号是否越界。';
  return '本题为逻辑变式训练。';
}

function mixPlan(){
  return [
    { key:'phonetic', mode:'correct', count:24 },
    { key:'orthography', mode:'correct', count:24 },
    { key:'grammar', mode:'correct', count:12 },
    { key:'grammar', mode:'wrong', count:12 },
    { key:'punctuation', mode:'correct', count:12 },
    { key:'punctuation', mode:'wrong', count:12 }

}

function buildMixedItems(bankKey, mode, count){
  const items = BANKS[bankKey] && BANKS[bankKey].items ? BANKS[bankKey].items : [];
  const semanticGood = [];
  const semanticBad = [];
  items.forEach(item => {
    if(!Array.isArray(item.options) || item.options.length !== 4) return;
    const itemMode = inferMixMode(bankKey, item);
    item.options.forEach((opt, idx) => {
      const isGood = itemMode === 'correct' ? idx === item.answer : idx !== item.answer;
      if(isGood) semanticGood.push({ text: opt });
      else semanticBad.push({ text: opt });
    });
  });
  const answerPool = mode === 'correct' ? semanticGood : semanticBad;
  const foilPool = mode === 'correct' ? semanticBad : semanticGood;
  const existing = new Set(items.map(item => canonicalSignature(item.stem, item.options, item.answer)));
  const results = [];
  let tries = 0;
  while(results.length < count && tries < count * 60){
    tries += 1;
    const answerEntry = answerPool[Math.floor(Math.random() * answerPool.length)];
    if(!answerEntry) break;
    const foils = [];
    while(foils.length < 3){
      const pick = foilPool[Math.floor(Math.random() * foilPool.length)];
      if(!pick || pick.text === answerEntry.text) continue;
      if(foils.some(item => item.text === pick.text)) continue;
      foils.push(pick);
    }
    const options = sample([answerEntry.text].concat(foils.map(i => i.text)), 4);
    const answer = options.indexOf(answerEntry.text);
    const stem = mixStemFor(bankKey, mode);
    const sig = canonicalSignature(stem, options, answer);
    if(existing.has(sig)) continue;
    existing.add(sig);
    results.push({
      id: bankKey + '-mix-' + mode + '-' + (results.length + 1),
      stem,
      options,
      answer,
      analysis: mixAnalysisFor(bankKey, mode),
      knowledge: collectBankKnowledge(bankKey).slice(0, 3),
      tags: [categoryTagLabel(bankKey), '逻辑变式']
    });
  }
  return results;
}

function ensureMixedBanks(){
  if(window.__frz_mixed_banks_ready) return true;
  const ready = mixPlan().every(plan => BANKS && BANKS[plan.key] && Array.isArray(BANKS[plan.key].items));
  if(!ready) return false;
  mixPlan().forEach(plan => {
    const extra = buildMixedItems(plan.key, plan.mode, plan.count);
    BANKS[plan.key].items = BANKS[plan.key].items.concat(extra);
  });
  window.__frz_mixed_banks_ready = true;
  return true;
}

function pickUnique(items, count, usedIds){
    const source = items.filter(item => !usedIds.has(item.id));
    const picked = sample(source.length >= count ? source : items, count);
    picked.forEach(item => usedIds.add(item.id));
    return picked;
  }

function pickByField(items, field, plan, usedIds){
    const results = [];
    Object.keys(plan).forEach(key => {
      const pool = items.filter(item => item[field] === key && !usedIds.has(item.id));
      const take = sample(pool.length >= plan[key] ? pool : items.filter(item => item[field] === key), plan[key]);
      take.forEach(item => {
        if(!usedIds.has(item.id)){
          results.push(item);
          usedIds.add(item.id);
        }
      });
    });
    return results;
  }

function buildPaper(){
    const paper = { knowledge: [], modern: [], classical: [], writing: null, answers: {}, score: null };
    const knowledgePool = ["phonetic","orthography","words","appropriateness","grammar","punctuation","rhetoric","sequence"];
    const usedKnowledge = new Set();
    let picks = [];
    knowledgePool.forEach(key => {
      const item = pickUnique(BANKS[key].items, 1, usedKnowledge)[0];
      if(item) picks.push({cat:key, item});
    });
    while(picks.length < 10){
      const key = knowledgePool[Math.floor(Math.random() * knowledgePool.length)];
      const extra = pickUnique(BANKS[key].items, 1, usedKnowledge)[0];
      if(extra) picks.push({cat:key, item:extra});
      if(usedKnowledge.size >= knowledgePool.reduce((sum, key) => sum + BANKS[key].items.length, 0)) break;
    }
    paper.knowledge = picks.slice(0,10);

    const usedModern = new Set();
    let modernPicks = [];
    modernPicks = modernPicks.concat(pickByField(BANKS.modern.items, "genre", {"论述类":3, "散文":3, "小说":2}, usedModern));
    if(modernPicks.length < 8){
      modernPicks = modernPicks.concat(pickUnique(BANKS.modern.items, 8 - modernPicks.length, usedModern));
    }
    paper.modern = modernPicks.slice(0,8).map(item => ({cat:"modern", item}));

    const usedClassical = new Set();
    let classicalPicks = [];
    classicalPicks = classicalPicks.concat(pickByField(BANKS.classical.items, "kind", {"断句":2, "文意概括":2, "词义理解":1, "内容理解":1}, usedClassical));
    if(classicalPicks.length < 6){
      classicalPicks = classicalPicks.concat(pickUnique(BANKS.classical.items, 6 - classicalPicks.length, usedClassical));
    }
    paper.classical = classicalPicks.slice(0,6).map(item => ({cat:"classical", item}));
    paper.writing = sample(BANKS.writing.items, 1)[0];
    return paper;
  }

const AUTH_STATE = {
  accountsMeta: null,
  accountsSummary: null,
  session: null,
  contentReady: false,
  sessionAccessKey: null
};

const AUTH_CONFIG = {
  sessionTtlMs: 6 * 60 * 60 * 1000,
  defaultIterations: 360000,
  maxFailsBeforeLock: 3,
  baseLockMs: 20000,
  maxLockMs: 10 * 60 * 1000
};

const AUTH_STORAGE = {
  session: 'frz_auth_session_v4',
  guard: 'frz_auth_guard_v4'
};

function normalizeUsername(value){
  return String(value || '').trim().toLowerCase();
}
function textToBytes(text){
  return new TextEncoder().encode(String(text));
}
function bytesToText(bytes){
  return new TextDecoder().decode(bytes);
}
function bytesToHex(bytes){
  return Array.from(bytes).map(b => b.toString(16).padStart(2,'0')).join('');
}
function bytesToB64(bytes){
  let out = '';
  bytes.forEach(b => out += String.fromCharCode(b));
  return btoa(out);
}
function b64ToBytes(b64){
  const bin = atob(String(b64 || ''));
  const out = new Uint8Array(bin.length);
  for(let i=0;i<bin.length;i++) out[i] = bin.charCodeAt(i);
  return out;
}
function randomBytes(length){
  const out = new Uint8Array(length);
  crypto.getRandomValues(out);
  return out;
}
async function sha256HexText(text){
  const digest = await crypto.subtle.digest('SHA-256', textToBytes(text));
  return bytesToHex(new Uint8Array(digest));
}
async function sha256HexBytes(bytes){
  const digest = await crypto.subtle.digest('SHA-256', bytes);
  return bytesToHex(new Uint8Array(digest));
}
async function isExpectedContentKey(contentKeyBytes){
  return await sha256HexBytes(contentKeyBytes) === EXPECTED_CONTENT_KEY_HASH;
}
async function sha256BytesText(text){
  const digest = await crypto.subtle.digest('SHA-256', textToBytes(text));
  return new Uint8Array(digest);
}
function buildDeviceFingerprint(){
  const tz = (Intl.DateTimeFormat().resolvedOptions().timeZone || '');
  const screenSig = window.screen ? [screen.width, screen.height, screen.colorDepth].join('x') : '';
  return [navigator.userAgent || '', navigator.language || '', navigator.platform || '', tz, screenSig, navigator.hardwareConcurrency || 0].join('||');
}
async function deriveSessionWrapKeyBytes(accountId, sessionSaltB64){
  const deviceHash = await sha256HexText(buildDeviceFingerprint());
  return await sha256BytesText(`${deviceHash}::${accountId}::${sessionSaltB64}::frz_session_v4`);
}
function buildAuthSecretVariants(usernameNormalized, password, account){
  const variants = [];
  if(account && account.accountNonce){
    variants.push(`${password}::${usernameNormalized}::${account.accountNonce}`);
  }else{
    variants.push(`${password}::${usernameNormalized}`);
    variants.push(`${password}::${usernameNormalized}::legacy-auth-v3`);
  }
  return Array.from(new Set(variants));
}
async function deriveAuthMaterialFromSecret(secret, authSaltB64, iterations){
  const key = await crypto.subtle.importKey('raw', textToBytes(secret), 'PBKDF2', false, ['deriveBits']);
  const bits = await crypto.subtle.deriveBits(
    { name:'PBKDF2', salt:b64ToBytes(authSaltB64), iterations:Number(iterations || AUTH_CONFIG.defaultIterations), hash:'SHA-256' },
    key,
    64 * 8
  );
  return new Uint8Array(bits);
}
async function aesGcmEncryptBytes(keyBytes, plainBytes){
  const iv = randomBytes(12);
  const key = await crypto.subtle.importKey('raw', keyBytes, 'AES-GCM', false, ['encrypt']);
  const cipher = await crypto.subtle.encrypt({ name:'AES-GCM', iv }, key, plainBytes);
  return { iv: bytesToB64(iv), cipher: bytesToB64(new Uint8Array(cipher)) };
}
async function aesGcmDecryptBytes(keyBytes, ivB64, cipherB64){
  const key = await crypto.subtle.importKey('raw', keyBytes, 'AES-GCM', false, ['decrypt']);
  const plain = await crypto.subtle.decrypt({ name:'AES-GCM', iv:b64ToBytes(ivB64) }, key, b64ToBytes(cipherB64));
  return new Uint8Array(plain);
}
function parseTimeValue(value){
  if(!value) return 0;
  const ts = new Date(value).getTime();
  return Number.isFinite(ts) ? ts : 0;
}
function getAccountStatus(account){
  if(!account) return { ok:false, message:'账号不可用，请联系服务方。' };
  if(account.enabled === false) return { ok:false, message:'账号已停用，请联系服务方。' };
  const now = Date.now();
  const start = parseTimeValue(account.notBefore);
  if(start && now < start) return { ok:false, message:'账号尚未生效，请联系服务方。' };
  const end = parseTimeValue(account.expiresAt);
  if(end && now > end) return { ok:false, message:'账号已到期，请联系服务方。' };
  return { ok:true, message:'' };
}
async function findAccountByLogin(usernameNormalized, includeInactive){
  if(!AUTH_STATE.accountsMeta || !Array.isArray(AUTH_STATE.accountsMeta.accounts)) return { account:null, status:null };
  for(const account of AUTH_STATE.accountsMeta.accounts){
    const loginHash = await sha256HexText(`${usernameNormalized}::${account.loginSalt}`);
    if(loginHash !== account.loginHash) continue;
    const status = getAccountStatus(account);
    if(includeInactive || status.ok) return { account, status };
    return { account, status };
  }
  return { account:null, status:null };
}
async function unlockContentKeyForAccount(account, usernameNormalized, password){
  const secrets = buildAuthSecretVariants(usernameNormalized, password, account);
  for(const secret of secrets){
    try{
      const material = await deriveAuthMaterialFromSecret(secret, account.authSalt, account.iterations);
      const verifyKey = material.slice(0, 32);
      const wrapKey = material.slice(32);
      const verifyHash = await sha256HexBytes(verifyKey);
      if(verifyHash !== account.verifyHash) continue;
      return await aesGcmDecryptBytes(wrapKey, account.keyWrapIv, account.wrappedContentKey);
    }catch(err){
      console.warn('账号解锁失败', err);
    }
  }
  return null;
}
async function decryptProtectedData(contentKeyBytes){
  const raw = await aesGcmDecryptBytes(contentKeyBytes, SEALED_CONTENT.iv, SEALED_CONTENT.cipher);
  return JSON.parse(bytesToText(raw));
}
function getGuard(){
  try{
    const raw = localStorage.getItem(AUTH_STORAGE.guard);
    const guard = raw ? JSON.parse(raw) : {};
    return { fails:Number(guard.fails || 0), lockUntil:Number(guard.lockUntil || 0) };
  }catch(err){
    return { fails:0, lockUntil:0 };
  }
}
function setGuard(guard){
  localStorage.setItem(AUTH_STORAGE.guard, JSON.stringify(guard));
}
function remainingLockMs(){
  const guard = getGuard();
  return Math.max(0, guard.lockUntil - Date.now());
}
function noteFailure(){
  const guard = getGuard();
  guard.fails += 1;
  if(guard.fails >= AUTH_CONFIG.maxFailsBeforeLock){
    const exponent = guard.fails - AUTH_CONFIG.maxFailsBeforeLock;
    const lockMs = Math.min(AUTH_CONFIG.baseLockMs * Math.pow(2, exponent), AUTH_CONFIG.maxLockMs);
    guard.lockUntil = Date.now() + lockMs;
  }
  setGuard(guard);
}
function clearFailures(){
  setGuard({ fails:0, lockUntil:0 });
}
function clearLocalAuthArtifacts(){

async function sealSessionAccessKey(accountId, contentKeyBytes){
  const sessionSalt = bytesToB64(randomBytes(16));
  const deviceHash = await sha256HexText(buildDeviceFingerprint());
  const wrapKey = await deriveSessionWrapKeyBytes(accountId, sessionSalt);
  const sealed = await aesGcmEncryptBytes(wrapKey, contentKeyBytes);
  return { sessionSalt, sessionIv: sealed.iv, sealedAccessKey: sealed.cipher, deviceHash };
}
async function unsealSessionAccessKey(session){
  if(!session || !session.accountId || !session.sessionSalt || !session.sessionIv || !session.sealedAccessKey) return null;
  const currentDeviceHash = await sha256HexText(buildDeviceFingerprint());
  if(session.deviceHash && session.deviceHash !== currentDeviceHash) return null;
  try{
    const wrapKey = await deriveSessionWrapKeyBytes(session.accountId, session.sessionSalt);
    return await aesGcmDecryptBytes(wrapKey, session.sessionIv, session.sealedAccessKey);
  }catch(err){
    return null;
  }
}
async function saveSession(account, usernameDisplay, contentKeyBytes){
  const sealed = await sealSessionAccessKey(account.accountId, contentKeyBytes);
  const session = {
    accountId: account.accountId,
    usernameDisplay,
    loginAt: Date.now(),
    expiresAt: Date.now() + AUTH_CONFIG.sessionTtlMs,
    sessionSalt: sealed.sessionSalt,
    sessionIv: sealed.sessionIv,
    sealedAccessKey: sealed.sealedAccessKey,
    deviceHash: sealed.deviceHash
  };
  AUTH_STATE.session = session;
  AUTH_STATE.sessionAccessKey = contentKeyBytes;
  localStorage.setItem(AUTH_STORAGE.session, JSON.stringify(session));
  localStorage.removeItem('frz_auth_session_v3');
  if(window.FRZ_AUTH) window.FRZ_AUTH.session = session;
  return session;
}
async function restoreSession(){
  try{
    const raw = localStorage.getItem(AUTH_STORAGE.session);
    if(!raw) return null;
    const session = JSON.parse(raw);
    if(!session || !session.accountId || !session.sealedAccessKey) return null;
    if(Number(session.expiresAt || 0) < Date.now()){
      localStorage.removeItem(AUTH_STORAGE.session);
      return null;
    }
    const accessKey = await unsealSessionAccessKey(session);
    if(!accessKey){
      localStorage.removeItem(AUTH_STORAGE.session);
      return null;
    }
    AUTH_STATE.session = session;
    AUTH_STATE.sessionAccessKey = accessKey;
    return { session, accessKey };
  }catch(err){
    localStorage.removeItem(AUTH_STORAGE.session);
    return null;
  }
}
function clearSession(options){
  const shouldReload = !options || options.reload !== false;
  clearLocalAuthArtifacts();
  if(shouldReload){
    window.location.reload();
  }else{
    showAuthGate('已退出当前账号。');
    updateAuthUi();
  }
}
async function loadAccountLibrary(){
  const status = document.getElementById("auth-status-text");
  const libraryMeta = document.getElementById('auth-library-meta');
  try{
    if(location.protocol === "file:"){
      throw new Error("请通过正式站点访问。");
    }
    const response = await fetch(`accounts.json?v=${Date.now()}`, { cache:"no-store" });
    if(!response.ok) throw new Error("会员通道暂未就绪，请稍后再试。");
    const data = await response.json();
    if(!data || !Array.isArray(data.accounts) || !data.accounts.length) throw new Error("会员通道暂未就绪，请稍后再试。");
    AUTH_STATE.accountsMeta = data;
    const total = data.accounts.length;
    const v4Count = data.accounts.filter(item => !!item.accountNonce).length;
    const v3Count = total - v4Count;
    const versionText = data.version ? `v${data.version}` : (v3Count && !v4Count ? '旧版兼容' : '混合兼容');
    AUTH_STATE.accountsSummary = { total, v4Count, v3Count, versionText };
    if(libraryMeta) libraryMeta.textContent = `账号库：${total} 个账号 · ${versionText}${v3Count ? ` · 旧账号兼容 ${v3Count} 个` : ''}`;
    if(status) status.textContent = v3Count ? "会员通道已就绪，已启用旧账号兼容，请输入账号和密码。" : "会员通道已就绪，请输入账号和密码。";
    return data;
  }catch(err){
    AUTH_STATE.accountsMeta = null;
    AUTH_STATE.accountsSummary = null;
    if(status) status.textContent = err && err.message ? err.message : "会员通道暂未就绪，请稍后再试。";
    if(libraryMeta) libraryMeta.textContent = '账号库：未读取到有效账号文件';
    return null;
  }
}
async function bootProtectedApp(contentKeyBytes){
  if(AUTH_STATE.contentReady) return true;
  try{
    const unlocked = await decryptProtectedData(contentKeyBytes);
    applyUnlockedData(unlocked);
    ensureEnhancedContent();
    updateHeroCopy();
    state.paper = null;
    if(!BANKS[state.practiceCategory]) state.practiceCategory = "phonetic";
    nextPracticeQuestion();
    renderActive();
    AUTH_STATE.contentReady = true;
    hideAuthGate();
    updateAuthUi();
    if(window.FRZ_AUTH) window.FRZ_AUTH.session = AUTH_STATE.session;
    return true;
  }catch(err){
    console.error(err);
    return false;
  }
}
async function tryAutoLogin(){
  const restored = await restoreSession();
  const meta = AUTH_STATE.accountsMeta;
  if(!restored || !meta || !Array.isArray(meta.accounts)) return false;
  const found = meta.accounts.find(item => item.accountId === restored.session.accountId);
  const status = getAccountStatus(found);
  if(!status.ok){
    clearSession({ reload:false });
    showAuthGate(status.message);
    return false;
  }
  const keyCompatible = await isExpectedContentKey(restored.accessKey);
  if(!keyCompatible){
    clearSession({ reload:false });
    showAuthGate('当前账号库与页面版本不匹配，请用当前工作台重新生成 accounts.json。');
    return false;
  }
  const ok = await bootProtectedApp(restored.accessKey);
  if(!ok){
    clearSession({ reload:false });
    showAuthGate('请重新输入账号和密码。');
    return false;
  }
  return true;
}
async function loginNow(){
  if(!window.crypto || !window.crypto.subtle){
    alert('当前浏览器环境暂不支持安全登录，请使用新版浏览器重试。');
    return;
  }
  const remain = remainingLockMs();
  if(remain > 0){
    const seconds = Math.max(1, Math.ceil(remain / 1000));
    showAuthGate(`操作过于频繁，请在 ${seconds} 秒后再试。`);
    return;
  }
  const usernameInput = document.getElementById('auth-username');
  const passwordInput = document.getElementById('auth-password');
  const usernameDisplay = (usernameInput.value || '').trim();
  const password = (passwordInput.value || '').trim();
  const usernameNormalized = normalizeUsername(usernameDisplay);
  if(!usernameNormalized || !password){
    alert('请输入账号和密码。');
    return;
  }
  if(!AUTH_STATE.accountsMeta || !Array.isArray(AUTH_STATE.accountsMeta.accounts)){
    alert('会员通道暂未就绪，请稍后再试。');
    return;
  }
  showAuthGate('正在验证账号，请稍候……');
  const match = await findAccountByLogin(usernameNormalized, true);
  if(!match.account){
    noteFailure();
    showAuthGate('账号或密码不正确，请重新输入。');
    alert('账号或密码不正确。');
    return;
  }
  const contentKey = await unlockContentKeyForAccount(match.account, usernameNormalized, password);
  if(!contentKey){
    noteFailure();
    showAuthGate('账号或密码不正确，请重新输入。');
    alert('账号或密码不正确。');
    return;
  }
  if(!match.status || !match.status.ok){
    const message = match.status && match.status.message ? match.status.message : '账号不可用，请联系服务方。';
    showAuthGate(message);
    alert(message);
    return;
  }
  const keyCompatible = await isExpectedContentKey(contentKey);
  if(!keyCompatible){
    const message = '当前账号库与页面版本不匹配，请用当前工作台重新生成 accounts.json。';
    showAuthGate(message);
    alert(message);
    return;
  }
  clearFailures();
  await saveSession(match.account, usernameDisplay, contentKey);
  const ok = await bootProtectedApp(contentKey);
  if(!ok){
    clearSession({ reload:false });
    showAuthGate('内容加载失败，请重新登录。');
    alert('内容加载失败，请重新登录。');
    return;
  }
}
function bindAuthEvents(){
  const loginBtn = document.getElementById("auth-login-btn");
  const refreshBtn = document.getElementById("auth-refresh-btn");
  const resetBtn = document.getElementById("auth-reset-btn");
  const openAuthBtn = document.getElementById("open-auth-btn");
  const logoutBtn = document.getElementById("logout-btn");
  const usernameInput = document.getElementById("auth-username");
  const passwordInput = document.getElementById("auth-password");

  if(loginBtn) loginBtn.onclick = loginNow;
  if(refreshBtn) refreshBtn.onclick = async () => {
    showAuthGate("正在重新连接……");
    await loadAccountLibrary();
    await tryAutoLogin();
  };
  if(resetBtn) resetBtn.onclick = async () => {
    clearLocalAuthArtifacts();
    if(usernameInput) usernameInput.value = '';
    if(passwordInput) passwordInput.value = '';
    showAuthGate('已清理本机旧登录与限速记录，请重新输入账号。');
    updateAuthUi();
    await loadAccountLibrary();
  };
  if(openAuthBtn) openAuthBtn.onclick = () => {
    showAuthGate(AUTH_STATE.session ? '请输入其他账号，或先退出当前账号。' : '请输入已开通的会员账号。');
  };
  if(logoutBtn) logoutBtn.onclick = () => clearSession({ reload:true });

  [usernameInput, passwordInput].forEach(el => {
    if(!el) return;
    el.addEventListener("keydown", (e) => {
      if(e.key === "Enter") loginNow();
    });
  });
}

injectAuthShell();
bindAuthEvents();
updateHeroCopy();

window.FRZ_AUTH = {
  session: AUTH_STATE.session,
  refresh(){
    updateAuthUi();
  }
};

showAuthGate("正在连接会员通道……");
loadAccountLibrary().then(() => tryAutoLogin()).then(() => {
  if(window.FRZ_AUTH) window.FRZ_AUTH.session = AUTH_STATE.session;
  updateAuthUi();
});
})();
</script>
