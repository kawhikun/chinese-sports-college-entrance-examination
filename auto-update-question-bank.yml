name: Auto Update Question Bank

on:
  workflow_dispatch:
  schedule:
    - cron: '25 2 * * *'

permissions:
  contents: write

jobs:
  update-bank:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Prepare source config
        run: |
          if [ ! -f update_sources.json ]; then
            cp update_sources.example.json update_sources.json
          fi

      - name: Run updater
        env:
          SITE_CONTENT_KEY_B64: ${{ secrets.SITE_CONTENT_KEY_B64 }}
        run: node scripts/auto_update_question_bank.mjs

      - name: Commit changes
        run: |
          if git diff --quiet; then
            echo "No changes to commit"
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add index.html .auto_update_state.json
          git commit -m "chore: auto update question bank"
          git push
